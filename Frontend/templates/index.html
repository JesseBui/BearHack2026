<!DOCTYPE html>
<html>
<head>
    <title>Flask Drawing Canvas</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { border: 2-px solid #333; cursor: crosshair; background: #fff; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Interactive Canvas</h1>
    <canvas id="drawCanvas" width="1000" height="500"></canvas>
    
    <div class="controls">
        <button onclick="clearCanvas()">Clear Canvas</button>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Start drawing
        canvas.addEventListener('mousedown', () => { drawing = true; });
        // Stop drawing
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        
        canvas.addEventListener('mousemove', draw);

        function draw(event) {
            if (!drawing) return;

            // line styles
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';

            // Get mouse position relative to canvas
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
