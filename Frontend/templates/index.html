<!doctype html>
<html>
  <head>
    <title>Sensor Canvas</title>
    <style>
      body {
        margin: 0;
        background: #f3f4f6;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        margin-bottom: 10px;
      }

      .toolbar {
        background: white;
        padding: 15px;
        border-radius: 12px;
        display: flex;
        gap: 18px;
        align-items: center;
        flex-wrap: wrap;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
        margin-bottom: 15px;
      }

      canvas {
        border: 2px solid #333;
        cursor: crosshair;
        background: #fff;
      }

      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 2px solid #333;
        background: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #e8f0ff;
      }

      .color-btn {
        width: 32px;
        height: 32px;
        padding: 0;
      }

      .selected {
        border: 4px solid #0066ff;
      }

      .shape-btn {
        font-size: 28px;
        width: 60px;
        height: 55px;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <h1>Sensor Canvas</h1>

    <div class="toolbar">
      <div>
        <strong>Color:</strong>
        <button
          class="color-btn selected"
          style="background: #000080"
          onclick="setColor('#000080', this)"
        ></button>
        <button
          class="color-btn"
          style="background: #006400"
          onclick="setColor('#006400', this)"
        ></button>
        <button
          class="color-btn"
          style="background: #800080"
          onclick="setColor('#800080', this)"
        ></button>
        <button
          class="color-btn"
          style="background: #ffff99"
          onclick="setColor('#ffff99', this)"
        ></button>
        <button
          class="color-btn"
          style="background: #ff0000"
          onclick="setColor('#ff0000', this)"
        ></button>
        <button
          class="color-btn"
          style="background: #ffcc99"
          onclick="setColor('#ffcc99', this)"
        ></button>
        <button onclick="saveCanvas()">Save</button>
      </div>

      <div>
        <strong>Brush:</strong>
        <button
          class="brush-btn shape-btn selected"
          onclick="setBrush('circle', this)"
        >
          ●
        </button>
        <button class="brush-btn shape-btn" onclick="setBrush('square', this)">
          ■
        </button>
        <button
          class="brush-btn shape-btn"
          onclick="setBrush('triangle', this)"
        >
          ▲
        </button>
        <button class="brush-btn shape-btn" onclick="setBrush('star', this)">
          ★
        </button>
      </div>

      <div>
        <strong>Size:</strong>
        <input type="range" min="5" max="80" value="20" id="sizeSlider" />
        <span id="sizeText">20</span>
      </div>

      <div>
        <strong>Opacity:</strong>
        <input type="range" min="0" max="100" value="100" id="opacitySlider" />
        <span id="opacityText">100</span>
      </div>

      <button onclick="clearCanvas()">Clear Canvas</button>
    </div>

    <canvas id="drawCanvas" width="1000" height="500"></canvas>

    <script>
      const canvas = document.getElementById("drawCanvas");
      const ctx = canvas.getContext("2d");

      let drawing = false;
      let currentColor = "#000080";
      let currentBrush = "circle";
      let brushSize = 20;
      let opacity = 1;

      const sizeSlider = document.getElementById("sizeSlider");
      const sizeText = document.getElementById("sizeText");
      const opacitySlider = document.getElementById("opacitySlider");
      const opacityText = document.getElementById("opacityText");

      sizeSlider.addEventListener("input", () => {
        brushSize = Number(sizeSlider.value);
        sizeText.textContent = brushSize;
      });

      opacitySlider.addEventListener("input", () => {
        opacity = Number(opacitySlider.value);
        opacityText.textContent = opacity;
      });

      canvas.addEventListener("mousedown", () => {
        drawing = true;
      });

      canvas.addEventListener("mouseup", () => {
        drawing = false;
      });

      canvas.addEventListener("mouseleave", () => {
        drawing = false;
      });

      canvas.addEventListener("mousemove", draw);

      function setColor(color, button) {
        currentColor = color;

        document.querySelectorAll(".color-btn").forEach((btn) => {
          btn.classList.remove("selected");
        });

        button.classList.add("selected");
      }

      function setBrush(brush, button) {
        currentBrush = brush;

        document.querySelectorAll(".brush-btn").forEach((btn) => {
          btn.classList.remove("selected");
        });

        button.classList.add("selected");
      }

      function draw(event) {
        if (!drawing) return;

        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        drawShape(x, y);
      }

      function drawShape(x, y) {
        ctx.globalAlpha = opacity;
        ctx.fillStyle = currentColor;

        if (currentBrush === "circle") {
          ctx.beginPath();
          ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (currentBrush === "square") {
          ctx.fillRect(
            x - brushSize / 2,
            y - brushSize / 2,
            brushSize,
            brushSize,
          );
        } else if (currentBrush === "triangle") {
          ctx.beginPath();
          ctx.moveTo(x, y - brushSize / 2);
          ctx.lineTo(x - brushSize / 2, y + brushSize / 2);
          ctx.lineTo(x + brushSize / 2, y + brushSize / 2);
          ctx.closePath();
          ctx.fill();
        } else if (currentBrush === "star") {
          drawStar(x, y, 5, brushSize / 2, brushSize / 4);
        }

        ctx.globalAlpha = 1;
      }

      function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
        let rotation = (Math.PI / 2) * 3;
        let x = cx;
        let y = cy;
        let step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);

        for (let i = 0; i < spikes; i++) {
          x = cx + Math.cos(rotation) * outerRadius;
          y = cy + Math.sin(rotation) * outerRadius;
          ctx.lineTo(x, y);
          rotation += step;

          x = cx + Math.cos(rotation) * innerRadius;
          y = cy + Math.sin(rotation) * innerRadius;
          ctx.lineTo(x, y);
          rotation += step;
        }

        ctx.closePath();
        ctx.fill();
      }

      function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function saveCanvas() {
        const link = document.createElement("a");

        link.href = canvas.toDataURL("image/png");

        link.download = `drawing_${Date.now()}.png`;

        link.click();
      }
    </script>
  </body>
</html>
